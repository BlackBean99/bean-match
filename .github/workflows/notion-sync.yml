name: Notion Sync

on:
  workflow_dispatch:

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_API_VERSION: ${{ secrets.NOTION_API_VERSION }}
      NOTION_MAIN_DATA_SOURCE_ID: ${{ secrets.NOTION_MAIN_DATA_SOURCE_ID }}
      NOTION_USERS_DATABASE_ID: ${{ secrets.NOTION_USERS_DATABASE_ID }}
      NOTION_INVITOR_DATA_SOURCE_ID: ${{ secrets.NOTION_INVITOR_DATA_SOURCE_ID }}
      NOTION_MATCHING_HISTORY_DATA_SOURCE_ID: ${{ secrets.NOTION_MATCHING_HISTORY_DATA_SOURCE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Log required sync secret presence
        shell: bash
        run: |
          missing=0

          check_any() {
            local label="$1"
            shift
            local present=false
            for var_name in "$@"; do
              if [ -n "${!var_name}" ]; then
                present=true
                break
              fi
            done
            echo "${label} present=${present}"
            if [ "${present}" != "true" ]; then
              missing=1
            fi
          }

          check_any "SUPABASE_URL" SUPABASE_URL NEXT_PUBLIC_SUPABASE_URL
          check_any "SUPABASE_SERVICE_ROLE_KEY" SUPABASE_SERVICE_ROLE_KEY
          check_any "NOTION_TOKEN" NOTION_TOKEN
          check_any "NOTION_MAIN_DATA_SOURCE_ID" NOTION_MAIN_DATA_SOURCE_ID NOTION_USERS_DATABASE_ID
          check_any "NOTION_INVITOR_DATA_SOURCE_ID" NOTION_INVITOR_DATA_SOURCE_ID
          check_any "NOTION_MATCHING_HISTORY_DATA_SOURCE_ID" NOTION_MATCHING_HISTORY_DATA_SOURCE_ID

          if [ "${missing}" -ne 0 ]; then
            echo "::error::One or more required sync secrets are missing from GitHub Actions secrets."
            exit 1
          fi

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run Notion sync
        run: npm run sync:notion -- --write
