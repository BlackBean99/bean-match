name: Cloudflare Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_API_VERSION: ${{ secrets.NOTION_API_VERSION }}
      NOTION_MAIN_DATA_SOURCE_ID: ${{ secrets.NOTION_MAIN_DATA_SOURCE_ID }}
      NOTION_USERS_DATABASE_ID: ${{ secrets.NOTION_USERS_DATABASE_ID }}
      NOTION_INVITOR_DATA_SOURCE_ID: ${{ secrets.NOTION_INVITOR_DATA_SOURCE_ID }}
      NOTION_MATCHING_HISTORY_DATA_SOURCE_ID: ${{ secrets.NOTION_MATCHING_HISTORY_DATA_SOURCE_ID }}
      CLOUDFLARE_IMAGES_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_IMAGES_ACCOUNT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_IMAGES_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_TOKEN }}
      CLOUDFLARE_IMAGES_VARIANT: ${{ secrets.CLOUDFLARE_IMAGES_VARIANT }}
      OPS_AUTH_SECRET: ${{ secrets.OPS_AUTH_SECRET }}
      OPS_AUTH_ACCOUNTS_JSON: ${{ secrets.OPS_AUTH_ACCOUNTS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build and deploy Worker with runtime secrets
        shell: bash
        env:
          # Cloudflare Worker name, not Pages project name.
          WORKER_NAME: blackbean-match
        run: |
          secret_file="$(mktemp)"
          cleanup() {
            rm -f "$secret_file"
          }
          trap cleanup EXIT

          missing=0

          require_value() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing GitHub secret: $key"
              missing=1
            fi
          }

          require_one_of() {
            local label="$1"
            shift
            local present=false
            for value in "$@"; do
              if [ -n "$value" ]; then
                present=true
                break
              fi
            done
            if [ "$present" = false ]; then
              echo "::error::Missing GitHub secret: $label"
              missing=1
            fi
          }

          require_value NOTION_TOKEN "$NOTION_TOKEN"
          require_value SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          require_value OPS_AUTH_SECRET "$OPS_AUTH_SECRET"
          require_value OPS_AUTH_ACCOUNTS_JSON "$OPS_AUTH_ACCOUNTS_JSON"
          require_one_of "SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL" "$SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_URL"

          normalize_secret_value() {
            local key="$1"
            local value="$2"
            printf '%s' "$value" | sed -E "s/^${key}[[:space:]]*[:=][[:space:]]*//"
          }

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if ! node - "$secret_file" <<'EOF'
          const fs = require("node:fs");
          const secretFile = process.argv[2];
          const normalize = (key, value) => {
            if (!value) return "";
            return String(value).replace(new RegExp(`^${key}\\s*[:=]\\s*`, "i"), "").trim();
          };

          const parseAccounts = (value) => {
            const normalized = normalize("OPS_AUTH_ACCOUNTS_JSON", value);
            const parsed = JSON.parse(normalized);
            if (!Array.isArray(parsed)) {
              throw new Error("OPS_AUTH_ACCOUNTS_JSON must be a JSON array");
            }
            return JSON.stringify(parsed);
          };

          const secrets = Object.fromEntries(
            Object.entries({
              SUPABASE_URL: process.env.SUPABASE_URL,
              NEXT_PUBLIC_SUPABASE_URL: process.env.NEXT_PUBLIC_SUPABASE_URL,
              SUPABASE_SERVICE_ROLE_KEY: process.env.SUPABASE_SERVICE_ROLE_KEY,
              NEXT_PUBLIC_SUPABASE_ANON_KEY: process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY,
              NOTION_TOKEN: process.env.NOTION_TOKEN,
              NOTION_API_VERSION: process.env.NOTION_API_VERSION,
              NOTION_MAIN_DATA_SOURCE_ID: process.env.NOTION_MAIN_DATA_SOURCE_ID,
              NOTION_USERS_DATABASE_ID: process.env.NOTION_USERS_DATABASE_ID,
              NOTION_INVITOR_DATA_SOURCE_ID: process.env.NOTION_INVITOR_DATA_SOURCE_ID,
              NOTION_MATCHING_HISTORY_DATA_SOURCE_ID: process.env.NOTION_MATCHING_HISTORY_DATA_SOURCE_ID,
              CLOUDFLARE_IMAGES_ACCOUNT_ID: process.env.CLOUDFLARE_IMAGES_ACCOUNT_ID,
              CLOUDFLARE_ACCOUNT_ID: process.env.CLOUDFLARE_ACCOUNT_ID,
              CLOUDFLARE_API_TOKEN: process.env.CLOUDFLARE_API_TOKEN,
              CLOUDFLARE_IMAGES_TOKEN: process.env.CLOUDFLARE_IMAGES_TOKEN,
              CLOUDFLARE_IMAGES_VARIANT: process.env.CLOUDFLARE_IMAGES_VARIANT,
              OPS_AUTH_SECRET: normalize("OPS_AUTH_SECRET", process.env.OPS_AUTH_SECRET),
              OPS_AUTH_ACCOUNTS_JSON: parseAccounts(process.env.OPS_AUTH_ACCOUNTS_JSON),
            }).filter(([, value]) => value !== undefined && value !== "")
          );

          fs.writeFileSync(secretFile, JSON.stringify(secrets, null, 2));
          EOF
          then
            echo "::error::Failed to normalize Worker secrets payload"
            exit 1
          fi

          npm run build
          npx wrangler deploy --name "$WORKER_NAME" --keep-vars --secrets-file "$secret_file"
